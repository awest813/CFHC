# desktop-jvm: shared engine + Swing — tests, jar, import/resource checks — no Android SDK.
# android: AGP unit tests (debug/beta/release) — requires SDK + JDK.
name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  desktop-jvm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Engine imports check (zero Android/Swing leaks)
        run: ./gradlew -p desktop-standalone :engine:checkEngineImports --no-daemon

      - name: Desktop standalone gate (no Android SDK)
        run: |
          unset ANDROID_HOME ANDROID_SDK_ROOT ANDROID_SDK_HOME || true
          ./gradlew -p desktop-standalone :engine:desktopStandaloneGate --no-daemon

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: 'tools platform-tools platforms;android-35 build-tools;35.0.0'

      - name: Run unit tests (Android + shared engine)
        run: ./gradlew test --no-daemon

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Android lint (debug)
        run: ./gradlew :app:lintDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: cfhc-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
