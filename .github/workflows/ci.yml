# Phase 1 (desktop standalone): Android unit tests + engine import guard + desktop Java compile.
name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Run unit tests (Android + shared engine)
        run: ./gradlew test --no-daemon

      - name: Compile desktop prototype (includes engine import check)
        run: ./gradlew compileDesktopJava --no-daemon
