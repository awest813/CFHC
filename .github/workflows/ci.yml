# Android unit tests + desktop standalone gate (engine imports, resource files, Swing classpath compile).
name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Run unit tests (Android + shared engine)
        run: ./gradlew test --no-daemon

      - name: Desktop standalone gate (desktopVerify)
        run: ./gradlew desktopVerify --no-daemon
